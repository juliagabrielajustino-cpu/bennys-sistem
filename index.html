<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Benny's System</title>

    <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>

    <div class="login-container">

        <div class="login-card">

            <img src="assets/img/bennys.png" class="logo">

            <h1>Benny's System</h1>

            <p>Faça login para continuar</p>

            <form id="loginForm">

<label for="idFuncionario">
    ID do funcionário
</label>

<input
    type="text"
    id="idFuncionario"
    placeholder="Exemplo: 1001"
    autocomplete="username"
    maxlength="30"
    required
>

                <input
                    type="password"
                    id="senha"
                    placeholder="Senha"
                    required
                >

                <button type="submit">
                    Entrar
                </button>

            </form>

            <p id="mensagem"></p>

        </div>

    </div>

    <script type="module" src="assets/js/auth.js"></script>

</body>

</html>
